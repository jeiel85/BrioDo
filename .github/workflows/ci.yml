name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_release:
        description: '릴리즈 AAB 빌드 포함 여부'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  # 1. 웹 빌드 테스트
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # 2. ESLint lint
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

  # 3. 유닛 테스트 (Vitest)
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run unit tests
        run: npm run test:unit

  # 4. E2E 테스트 (웹)
  e2e-web:
    name: E2E Tests (Web)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create .env for E2E (dummy Firebase config — app loads as guest)
        run: |
          echo "VITE_FIREBASE_API_KEY=ci-placeholder-key" >> .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=ci-placeholder.firebaseapp.com" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=ci-placeholder" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=ci-placeholder.appspot.com" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=000000000000" >> .env
          echo "VITE_FIREBASE_APP_ID=1:000000000000:web:ci-placeholder" >> .env
          echo "VITE_GEMINI_API_KEY=ci-placeholder-key" >> .env

      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # 4. Android 릴리즈 AAB 빌드 (수동 트리거, v* 태그 푸시, 또는 main 브랜치 푸시 시)
  android-release:
    name: Android Build (Release AAB)
    runs-on: ubuntu-latest
    needs: [build, lint]
    permissions:
      contents: write
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_release == 'true') ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Create .env for Android Build
        run: |
          echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY || 'ci-placeholder-key' }}" >> .env
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || 'ci-placeholder.firebaseapp.com' }}" >> .env
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID || 'ci-placeholder' }}" >> .env
          echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || 'ci-placeholder.appspot.com' }}" >> .env
          echo "VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || '000000000000' }}" >> .env
          echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID || '1:000000000000:web:ci-placeholder' }}" >> .env
          echo "VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY || 'ci-placeholder-key' }}" >> .env

      - name: Patch node_modules for Android
        run: |
          sed -i "s/getDefaultProguardFile('proguard-android.txt')/getDefaultProguardFile('proguard-android-optimize.txt')/g" \
            node_modules/@capacitor-community/speech-recognition/android/build.gradle \
            node_modules/@codetrix-studio/capacitor-google-auth/android/build.gradle
          sed -i "s/jcenter()/mavenCentral()/g" \
            node_modules/@codetrix-studio/capacitor-google-auth/android/build.gradle

      - name: Build web assets
        run: npm run build

      - name: Sync to Android
        run: npx cap sync android

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > android/app/google-services.json
          else
            echo "GOOGLE_SERVICES_JSON_BASE64 secret not set"
            exit 1
          fi

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/blenddo-release.jks
          else
            echo "ANDROID_KEYSTORE_BASE64 secret not set"
            exit 1
          fi

      - name: Create keystore.properties
        run: |
          cat > keystore.properties << EOF
          storeFile=blenddo-release.jks
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyAlias=blenddo
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --quiet

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## BrioDo ${{ github.ref_name }}

            - 커밋: ${{ github.sha }}
            - 빌드 시각: ${{ github.event.head_commit.timestamp }}
          files: |
            android/app/build/outputs/apk/release/app-release.apk
          prerelease: false
          make_latest: true
